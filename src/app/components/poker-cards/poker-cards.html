<h2 class="title">Select Estimate</h2>

<div class="cards">

    <div
        *ngFor="let card of cards"
        class="poker-card"
        [class.selected]="selectedCard === card"
        (click)="selectCard(card)">

        <span class="card-number">
            {{ card }}
        </span>

    </div>

</div>

<div
    *ngIf="selectedCard !== null"
    class="selection">

    ✅ Your vote:
    <strong>{{ selectedCard }}</strong>

</div>
